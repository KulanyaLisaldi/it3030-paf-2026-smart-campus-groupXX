spring.application.name=server
server.port=8081

spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=smartcampus

# Google OAuth (Google Cloud Console: Authorized redirect URI = http://localhost:8081/login/oauth2/code/google)
# Use real credentials from Google Cloud Console; placeholders allow the app to start before they are set.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:replace-me}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:replace-me}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Where to send the browser after Google login (React dev server)
app.frontend-url=http://localhost:5173

# Base URL of this API (used in technician verification emails). Production: https://api.yourdomain.com
app.public-api-base-url=${PUBLIC_API_BASE_URL:http://localhost:8081}

# JWT for API Bearer auth (use a long random secret in production, min 32 characters recommended)
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=86400000

# First admin (runs once when no ADMIN exists). Use strong password. Example .env:
# BOOTSTRAP_ADMIN_EMAIL=admin@campus.edu
# BOOTSTRAP_ADMIN_PASSWORD=change-me
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.first-name=Admin
app.bootstrap.admin.last-name=System

# SMTP (required for password-change OTP email verification)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
app.mail.from=${MAIL_FROM:no-reply@smartcampus.local}